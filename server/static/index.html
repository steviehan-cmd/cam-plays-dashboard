<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM PLAYS — Camarilla Pivot Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .mono {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    color: #e8e8e8;
    letter-spacing: -0.3px;
  }
  .header .subtitle {
    font-size: 11px;
    color: #444;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 6px rgba(0,255,136,0.5);
    animation: pulse 3s ease-in-out infinite;
  }
  .live-dot.disconnected {
    background: #ff4466;
    box-shadow: 0 0 6px rgba(255,68,102,0.5);
  }
  .live-label { font-size: 11px; color: #555; }
  .clock {
    font-size: 13px;
    color: #444;
    font-variant-numeric: tabular-nums;
  }

  /* Summary bar */
  .summary {
    display: flex;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.01);
  }
  .summary-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .summary-count {
    font-size: 20px;
    font-weight: 800;
  }
  .summary-label {
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 20px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: #555;
  }

  /* Status indicators */
  .status-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .status-dot.active {
    background: #00ff88;
    box-shadow: 0 0 12px #00ff88, 0 0 24px rgba(0,255,136,0.3);
  }
  .status-dot.active::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: rgba(0,255,136,0.15);
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.candidate {
    background: #ffaa00;
    box-shadow: 0 0 8px rgba(255,170,0,0.5);
  }
  .status-dot.passed { background: #555; }
  .status-dot.idle { background: #2a2a2a; }

  /* Instrument rows */
  .instrument-row {
    display: grid;
    grid-template-columns: 18px 100px 1fr 50px;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.04);
    transition: background 0.3s ease;
    min-height: 48px;
  }
  .instrument-row:first-child { border-top: none; }
  .instrument-row.active-row { background: rgba(0,255,136,0.04); }
  .instrument-row.candidate-row { background: rgba(255,170,0,0.02); }

  .ticker-area { padding-left: 8px; }
  .ticker-link {
    font-size: 14px;
    font-weight: 700;
    color: #e8e8e8;
    letter-spacing: 0.3px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s ease;
  }
  .ticker-link:hover { color: #58a6ff; }
  .ticker-link:hover .chart-icon { color: #58a6ff; }
  .ticker-link.inactive { color: #555; }

  .chart-icon { color: #333; transition: color 0.15s ease; }

  .context-row {
    font-size: 10px;
    margin-top: 2px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .ctx-sep { color: #2a2a2a; }
  .ctx-higher { color: #00cc6a; font-weight: 600; }
  .ctx-lower { color: #ff4466; font-weight: 600; }
  .ctx-neutral { color: #666; font-weight: 600; }
  .ctx-dim { color: #444; }
  .ctx-eth { color: #a78bfa; font-weight: 600; }
  .ctx-rth { color: #555; }

  /* Play tags */
  .plays-area {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    padding-left: 8px;
  }

  .play-tag {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 13px;
    letter-spacing: 0.5px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .play-tag.active-long {
    background: linear-gradient(135deg, #003d1f, #005a2b);
    border: 1px solid #00ff88;
    color: #00ff88;
    font-weight: 700;
  }
  .play-tag.active-short {
    background: linear-gradient(135deg, #3d0000, #5a0015);
    border: 1px solid #ff4466;
    color: #ff4466;
    font-weight: 700;
  }
  .play-tag.candidate-tag {
    background: rgba(255,170,0,0.08);
    border: 1px solid rgba(255,170,0,0.35);
    color: #ffaa00;
    font-weight: 600;
  }
  .play-tag.passed-tag {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: #555;
    text-decoration: line-through;
  }

  .play-desc {
    font-size: 11px;
    opacity: 0.7;
  }
  .play-desc.long { color: #00cc6a; }
  .play-desc.short { color: #ff4466; }

  .idle-dash {
    font-size: 12px;
    color: #333;
    font-style: italic;
  }

  .timestamp {
    text-align: right;
    font-size: 11px;
    color: #333;
  }
  .timestamp.active-ts { color: #555; }

  /* Footer */
  .footer {
    padding: 8px 16px;
    border-top: 1px solid rgba(255,255,255,0.04);
    text-align: center;
    font-size: 10px;
    color: #2a2a2a;
  }

  /* Audio toggle */
  .audio-toggle {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: #555;
    font-size: 11px;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .audio-toggle:hover { border-color: rgba(255,255,255,0.2); color: #888; }
  .audio-toggle.enabled { border-color: #00ff88; color: #00ff88; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  @keyframes flash-green {
    0% { background: rgba(0,255,136,0.15); }
    100% { background: rgba(0,255,136,0.04); }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1 class="mono">CAM PLAYS</h1>
      <span class="subtitle">Camarilla Pivot Scanner</span>
    </div>
    <div class="header-right">
      <button class="audio-toggle" id="audioToggle" onclick="toggleAudio()">🔇</button>
      <div style="display:flex;align-items:center;gap:5px">
        <div class="live-dot" id="liveDot"></div>
        <span class="live-label" id="liveLabel">LIVE</span>
      </div>
      <span class="clock mono" id="clock"></span>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary"></div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="status-dot active"></div><span>Active — act now</span></div>
    <div class="legend-item"><div class="status-dot candidate"></div><span>Candidate — watching</span></div>
    <div class="legend-item"><div class="status-dot passed"></div><span>Passed — review later</span></div>
    <div class="legend-item"><div class="status-dot idle"></div><span>Idle — nothing</span></div>
  </div>

  <!-- Instruments -->
  <div id="instruments"></div>

  <!-- Footer -->
  <div class="footer" id="footer">Connecting to server...</div>
</div>

<script>
// ---- Configuration ----
const POLL_INTERVAL = 2000; // Poll every 2 seconds
const API_BASE = window.location.origin;

let audioEnabled = false;
let previousState = {};
let connected = false;

// ---- Audio notification ----
function playAlertSound() {
  if (!audioEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } catch (e) {
    console.log('Audio not available');
  }
}

function toggleAudio() {
  audioEnabled = !audioEnabled;
  const btn = document.getElementById('audioToggle');
  btn.textContent = audioEnabled ? '🔔' : '🔇';
  btn.classList.toggle('enabled', audioEnabled);
}

// ---- Clock ----
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ---- Status helpers ----
function getStatus(inst) {
  if (inst.active) return 'active';
  if (inst.candidates && inst.candidates.length > 0) return 'candidate';
  if (inst.passed && inst.passed.length > 0) return 'passed';
  return 'idle';
}

function getPriority(inst) {
  const s = getStatus(inst);
  if (s === 'active') return 0;
  if (s === 'candidate') return 1;
  if (s === 'passed') return 2;
  return 3;
}

function formatTime(isoStr) {
  if (!isoStr) return '';
  try {
    // Handle both "2026-04-07 09:42:00" and ISO formats
    const d = new Date(isoStr.replace(' ', 'T'));
    if (isNaN(d.getTime())) return isoStr.substring(11, 16);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
  } catch {
    return '';
  }
}

// ---- Chart icon SVG ----
const chartIconSVG = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none" class="chart-icon">
  <rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <polyline points="3,9 5.5,5 8,7.5 11,4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

// ---- Render functions ----
function renderSummary(instruments) {
  const active = instruments.filter(i => i.active).length;
  const watching = instruments.filter(i => !i.active && i.candidates && i.candidates.length > 0).length;
  const passed = instruments.filter(i => !i.active && (!i.candidates || i.candidates.length === 0) && i.passed && i.passed.length > 0).length;

  document.getElementById('summary').innerHTML = `
    <div class="summary-item">
      <span class="summary-count mono" style="color:#00ff88">${active}</span>
      <span class="summary-label">active</span>
    </div>
    <div class="summary-item">
      <span class="summary-count mono" style="color:#ffaa00">${watching}</span>
      <span class="summary-label">watching</span>
    </div>
    <div class="summary-item">
      <span class="summary-count mono" style="color:#555">${passed}</span>
      <span class="summary-label">passed</span>
    </div>
  `;
}

function renderInstrument(inst) {
  const status = getStatus(inst);
  const isInactive = status === 'idle' || status === 'passed';
  const tvUrl = inst.exchange
    ? `https://www.tradingview.com/chart/?symbol=${inst.exchange}:${inst.ticker}`
    : `https://www.tradingview.com/chart/?symbol=${inst.ticker}`;

  const rangeClass = inst.range === 'Higher' ? 'ctx-higher' : inst.range === 'Lower' ? 'ctx-lower' : 'ctx-neutral';
  const rangeLabel = inst.range ? inst.range[0] : '—';

  const widthMap = { Wide: 'W', Narrow: 'N', Similar: '~', Versatile: 'V' };
  const widthLabel = inst.width ? (widthMap[inst.width] || inst.width[0]) : '—';

  const dsClass = inst.dataSource === 'ETH' ? 'ctx-eth' : 'ctx-rth';
  const dsLabel = inst.dataSource || '—';

  // Build plays HTML
  let playsHtml = '';

  if (inst.active) {
    const dir = inst.activeDirection || 'long';
    const tagClass = dir === 'long' ? 'active-long' : 'active-short';
    const arrow = dir === 'long' ? '▲' : '▼';
    const descClass = dir === 'long' ? 'long' : 'short';
    playsHtml += `<span class="play-tag ${tagClass} mono"><span style="font-size:11px">${arrow}</span> ${inst.active}</span>`;
    if (inst.activeDesc) {
      playsHtml += `<span class="play-desc ${descClass} mono">${inst.activeDesc}</span>`;
    }
  }

  if (inst.candidates) {
    for (const c of inst.candidates) {
      playsHtml += `<span class="play-tag candidate-tag mono">${c}</span>`;
    }
  }

  if (inst.passed) {
    for (const p of inst.passed) {
      playsHtml += `<span class="play-tag passed-tag mono">${p}</span>`;
    }
  }

  if (!playsHtml) {
    playsHtml = '<span class="idle-dash">—</span>';
  }

  const showTime = inst.active || (inst.candidates && inst.candidates.length > 0);
  const timeStr = showTime ? formatTime(inst.lastUpdate) : '';
  const tsClass = status === 'active' ? 'active-ts' : '';

  return `
    <div class="instrument-row ${status === 'active' ? 'active-row' : status === 'candidate' ? 'candidate-row' : ''}">
      <div class="status-dot ${status}"></div>
      <div class="ticker-area">
        <a href="${tvUrl}" target="_blank" rel="noopener noreferrer" class="ticker-link mono ${isInactive ? 'inactive' : ''}">
          ${inst.ticker} ${chartIconSVG}
        </a>
        <div class="context-row mono">
          <span class="${rangeClass}">${rangeLabel}</span>
          <span class="ctx-sep">·</span>
          <span class="ctx-dim">${widthLabel}</span>
          <span class="ctx-sep">·</span>
          <span class="${dsClass}">${dsLabel}</span>
        </div>
      </div>
      <div class="plays-area">${playsHtml}</div>
      <div class="timestamp ${tsClass} mono">${timeStr}</div>
    </div>
  `;
}

function renderAll(instruments) {
  // Sort by priority
  const sorted = [...instruments].sort((a, b) => getPriority(a) - getPriority(b));

  renderSummary(sorted);

  const container = document.getElementById('instruments');
  container.innerHTML = sorted.map(renderInstrument).join('');

  // Check for new active plays and alert
  for (const inst of instruments) {
    const prev = previousState[inst.ticker];
    if (inst.active && (!prev || prev.active !== inst.active)) {
      playAlertSound();
      // Browser notification
      if (audioEnabled && 'Notification' in window && Notification.permission === 'granted') {
        new Notification(`CAM PLAYS: ${inst.ticker} ${inst.active}`, {
          body: `${inst.activeDesc} (${inst.activeDirection})`,
          icon: '📊',
        });
      }
    }
    previousState[inst.ticker] = { ...inst };
  }
}

// ---- Polling ----
async function fetchState() {
  try {
    const res = await fetch(`${API_BASE}/api/state`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderAll(data.instruments || []);

    if (!connected) {
      connected = true;
      document.getElementById('liveDot').classList.remove('disconnected');
      document.getElementById('liveLabel').textContent = 'LIVE';
    }
    document.getElementById('footer').textContent =
      `Polling every ${POLL_INTERVAL/1000}s · ${(data.instruments || []).length} instruments tracked`;

  } catch (err) {
    console.error('Fetch error:', err);
    connected = false;
    document.getElementById('liveDot').classList.add('disconnected');
    document.getElementById('liveLabel').textContent = 'OFFLINE';
    document.getElementById('footer').textContent = 'Connection lost — retrying...';
  }
}

// Request notification permission on first interaction
document.addEventListener('click', () => {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}, { once: true });

// Start polling
fetchState();
setInterval(fetchState, POLL_INTERVAL);
</script>

</body>
</html>
