<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM PLAYS — Camarilla Pivot Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8e8e8;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.mono{font-family:'JetBrains Mono','Fira Code',monospace}
.container{max-width:820px;margin:0 auto;border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.5)}

.header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{margin:0;font-size:18px;font-weight:800;color:#e8e8e8;font-family:'Outfit',sans-serif;letter-spacing:1.5px}
.header .sub{font-size:11px;color:#444}
.header-right{display:flex;align-items:center;gap:12px}

.audio-toggle{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#555;font-size:11px;padding:2px 8px;cursor:pointer}
.audio-toggle.on{border-color:#00ff88;color:#00ff88}

.live-dot{width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px rgba(0,255,136,0.5);animation:pulse 3s ease-in-out infinite}
.live-dot.off{background:#ff4466;box-shadow:0 0 6px rgba(255,68,102,0.5)}

.summary{display:flex;gap:16px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.01)}
.summary-item{display:flex;align-items:center;gap:5px}
.summary-count{font-size:20px;font-weight:800}
.summary-label{font-size:10px;color:#555;text-transform:uppercase}

.legend{display:flex;gap:20px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#555}

.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;position:relative}
.status-dot.active{background:#00ff88;box-shadow:0 0 10px #00ff88,0 0 20px rgba(0,255,136,0.3)}
.status-dot.active::before{content:'';position:absolute;inset:-5px;border-radius:50%;background:rgba(0,255,136,0.15);animation:pulse 2s ease-in-out infinite}
.status-dot.candidate{background:#ffaa00;box-shadow:0 0 6px rgba(255,170,0,0.5)}
.status-dot.passed{background:#555}
.status-dot.idle{background:#2a2a2a}

.col-headers{display:grid;grid-template-columns:160px 1fr 24px 1fr;padding:8px 0 4px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header-group{display:grid;grid-template-columns:repeat(6,1fr);padding:0 4px}
.header-group span{text-align:center;font-size:12px;color:#555;font-weight:600;letter-spacing:0.3px}

.rows{display:flex;flex-direction:column;gap:6px;padding:6px 0}
.inst-row{display:grid;grid-template-columns:160px 1fr 24px 1fr;align-items:center;padding:2px 0}
.inst-row.active-bg{background:rgba(0,255,136,0.02)}

.ticker-cell{padding:4px 12px;display:flex;align-items:center;gap:8px}
.ticker-link{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;text-decoration:none;letter-spacing:0.5px;transition:color 0.15s}
.ticker-link:hover{color:#58a6ff !important}
.ticker-ts{font-size:10px}
.ticker-ctx{display:flex;gap:4px;margin-top:1px;font-size:10px}
.ctx-sep{color:#1a1a1a}
.ctx-h{color:#00cc6a;font-weight:600}
.ctx-l{color:#ff4466;font-weight:600}
.ctx-n{color:#666;font-weight:600}
.ctx-eth{color:#a78bfa;font-weight:600}

.play-group{display:grid;grid-template-columns:repeat(6,1fr);border:1px solid transparent;border-radius:5px;padding:5px 4px;min-height:34px;align-items:center}
.play-group.highlighted{border-color:rgba(255,255,255,0.45)}

.play-cell{text-align:center;padding:2px 0}
.play-dim{font-size:11px;color:#444;letter-spacing:0.3px}
.play-tag{padding:3px 8px;border-radius:4px;font-size:12px;letter-spacing:0.5px;display:inline-flex;align-items:center;gap:4px}
.play-tag.active-long{background:linear-gradient(135deg,#003d1f,#005a2b);border:1px solid #00ff88;color:#00ff88;font-weight:700}
.play-tag.active-short{background:linear-gradient(135deg,#3d0000,#5a0015);border:1px solid #ff4466;color:#ff4466;font-weight:700}
.play-tag.cand{background:rgba(255,170,0,0.08);border:1px solid rgba(255,170,0,0.35);color:#ffaa00;font-weight:600}
.play-tag.pass{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#555;text-decoration:line-through}
.play-arrow{font-size:9px}

.footer{padding:6px 16px;border-top:1px solid rgba(255,255,255,0.04);text-align:center;font-size:10px;color:#2a2a2a}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div style="display:flex;align-items:baseline;gap:10px">
      <h1>CAM PLAYS</h1>
      <span class="sub">Camarilla Pivot Scanner</span>
    </div>
    <div class="header-right">
      <button class="audio-toggle on" id="audioBtn" onclick="toggleAudio()">🔔</button>
      <div style="display:flex;align-items:center;gap:5px">
        <div class="live-dot" id="liveDot"></div>
        <span style="font-size:11px;color:#555" id="liveLabel">LIVE</span>
      </div>
      <span class="mono" id="clock" style="font-size:13px;color:#444;font-variant-numeric:tabular-nums"></span>
    </div>
  </div>
  <div class="summary" id="summary"></div>
  <div class="legend">
    <div class="legend-item"><div class="status-dot active"></div><span>Active — act now</span></div>
    <div class="legend-item"><div class="status-dot candidate"></div><span>Candidate — watching</span></div>
    <div class="legend-item"><div class="status-dot passed"></div><span>Passed — review later</span></div>
    <div class="legend-item"><div class="status-dot idle"></div><span>Idle — nothing</span></div>
  </div>
  <div class="col-headers" id="colHeaders"></div>
  <div class="rows" id="rows"></div>
  <div class="footer" id="footer">Connecting...</div>
</div>

<script>
const POLL = 2000;
const API = window.location.origin;
const L_PLAYS = ["LA","LB","LC","LD","LE","LF"];
const H_PLAYS = ["HA","HB","HC","HD","HE","HF"];
const FIXED_ORDER = ["MES1!","MNQ1!","MYM1!","M2K1!","MGC1!","SIL1!","MCL1!","MBT1!"];
const PLAY_META = {
  LA:{dir:"short",desc:"R3→S3"},LB:{dir:"short",desc:"S4→S6"},LC:{dir:"short",desc:"S4→S6"},
  LD:{dir:"long",desc:"R4→R6"},LE:{dir:"long",desc:"S4→R4"},LF:{dir:"long",desc:"S6→CP"},
  HA:{dir:"long",desc:"S3→R3"},HB:{dir:"long",desc:"R4→R6"},HC:{dir:"long",desc:"R4→R6"},
  HD:{dir:"short",desc:"S4→S6"},HE:{dir:"short",desc:"R4→S4"},HF:{dir:"short",desc:"R6→CP"},
};
const EXCHANGES = {
  "MES1!":"CME_MINI","MNQ1!":"CME_MINI","MYM1!":"CBOT_MINI","M2K1!":"CME_MINI",
  "MGC1!":"COMEX","SIL1!":"COMEX","MCL1!":"NYMEX","MBT1!":"CME"
};

let audioOn = true;
let prevState = {};
let connected = false;

// Audio
function ping(){
  if(!audioOn)return;
  try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.5);o.start(c.currentTime);o.stop(c.currentTime+0.5)}catch(e){}
}
function toggleAudio(){
  audioOn=!audioOn;
  const b=document.getElementById('audioBtn');
  b.textContent=audioOn?'🔔':'🔇';
  b.className='audio-toggle'+(audioOn?' on':'');
}

// Clock
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(tick,1000);tick();

// Column headers
function initHeaders(){
  const h=document.getElementById('colHeaders');
  h.innerHTML='<div></div><div class="header-group mono">'+L_PLAYS.map(p=>'<span>'+PLAY_META[p].desc+'</span>').join('')+'</div><div></div><div class="header-group mono">'+H_PLAYS.map(p=>'<span>'+PLAY_META[p].desc+'</span>').join('')+'</div>';
}
initHeaders();

// Status
function getStatus(inst){
  if(inst.active)return 'active';
  if(inst.candidates&&inst.candidates.length)return 'candidate';
  if(inst.passed&&inst.passed.length)return 'passed';
  return 'idle';
}

function fmtTime(t){
  if(!t)return '';
  try{const d=new Date(t.replace(' ','T'));if(isNaN(d.getTime()))return t.substring(11,16);return d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'})}catch(e){return ''}
}

function playCell(play,inst){
  let st='dim';
  if(inst.active===play)st='active';
  else if(inst.candidates&&inst.candidates.includes(play))st='candidate';
  else if(inst.passed&&inst.passed.includes(play))st='passed';
  const m=PLAY_META[play];
  if(st==='dim')return '<div class="play-cell"><span class="play-dim mono">'+play+'</span></div>';
  let cls='play-tag mono ';
  let arrow='';
  if(st==='active'){cls+=m.dir==='long'?'active-long':'active-short';arrow='<span class="play-arrow">'+(m.dir==='long'?'▲':'▼')+'</span> '}
  else if(st==='candidate')cls+='cand';
  else cls+='pass';
  return '<div class="play-cell"><span class="'+cls+'">'+arrow+play+'</span></div>';
}

function playGroup(plays,inst,highlighted){
  return '<div class="play-group'+(highlighted?' highlighted':'')+'">'+plays.map(p=>playCell(p,inst)).join('')+'</div>';
}

function renderRow(inst){
  const s=getStatus(inst);
  const ex=EXCHANGES[inst.ticker]||inst.exchange||'';
  const url=ex?'https://www.tradingview.com/chart/?symbol='+ex+':'+inst.ticker:'#';
  const inactive=s==='idle'||s==='passed';
  const range=inst.range||'Neutral';
  const rc=range==='Higher'?'ctx-h':range==='Lower'?'ctx-l':'ctx-n';
  const wm={Wide:'W',Narrow:'N',Similar:'~',Versatile:'V'};
  const hasTime=inst.active||inst.candidates&&inst.candidates.length;
  const ts=hasTime?fmtTime(inst.lastUpdate):'';

  return '<div class="inst-row'+(inst.active?' active-bg':'')+'">'+
    '<div class="ticker-cell">'+
      '<div class="status-dot '+s+'"></div>'+
      '<div>'+
        '<div style="display:flex;align-items:center;gap:12px">'+
          '<a href="'+url+'" target="_blank" class="ticker-link" style="color:'+(inactive?'#444':'#e8e8e8')+'">'+inst.ticker+'</a>'+
          (ts?'<span class="mono ticker-ts" style="color:'+(s==='active'?'#555':'#333')+'">'+ts+'</span>':'')+
        '</div>'+
        '<div class="ticker-ctx mono">'+
          '<span class="'+rc+'">'+(inst.range?inst.range[0]:'—')+'</span>'+
          '<span class="ctx-sep">·</span>'+
          '<span style="color:#444">'+(wm[inst.width]||'—')+'</span>'+
          '<span class="ctx-sep">·</span>'+
          '<span class="'+(inst.dataSource==='ETH'?'ctx-eth':'')+'" style="color:'+(inst.dataSource==='ETH'?'#a78bfa':'#444')+'">'+(inst.dataSource||'—')+'</span>'+
        '</div>'+
      '</div>'+
    '</div>'+
    playGroup(L_PLAYS,inst,range==='Lower')+
    '<div></div>'+
    playGroup(H_PLAYS,inst,range==='Higher')+
  '</div>';
}

function renderAll(instruments){
  // Build lookup
  const map={};
  for(const i of instruments)map[i.ticker]=i;

  // Summary
  const active=instruments.filter(i=>i.active).length;
  const watching=instruments.filter(i=>!i.active&&i.candidates&&i.candidates.length).length;
  const passed=instruments.filter(i=>!i.active&&(!i.candidates||!i.candidates.length)&&i.passed&&i.passed.length).length;
  document.getElementById('summary').innerHTML=
    [{c:active,col:'#00ff88',l:'active'},{c:watching,col:'#ffaa00',l:'watching'},{c:passed,col:'#555',l:'passed'}]
    .map(x=>'<div class="summary-item"><span class="summary-count mono" style="color:'+x.col+'">'+x.c+'</span><span class="summary-label">'+x.l+'</span></div>').join('');

  // Rows in fixed order
  const rows=document.getElementById('rows');
  rows.innerHTML=FIXED_ORDER.map(t=>{
    const inst=map[t]||{ticker:t,active:null,candidates:[],passed:[],range:null,width:null,dataSource:null};
    return renderRow(inst);
  }).join('');

  // Check for new active plays
  for(const inst of instruments){
    const prev=prevState[inst.ticker];
    if(inst.active&&(!prev||prev.active!==inst.active)){
      ping();
      if(audioOn&&'Notification' in window&&Notification.permission==='granted'){
        new Notification('CAM PLAYS: '+inst.ticker+' '+inst.active,{body:(inst.activeDesc||'')+' ('+(inst.activeDirection||'')+')'});
      }
    }
    prevState[inst.ticker]={...inst};
  }
}

async function poll(){
  try{
    const r=await fetch(API+'/api/state');
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    renderAll(d.instruments||[]);
    if(!connected){connected=true;document.getElementById('liveDot').classList.remove('off');document.getElementById('liveLabel').textContent='LIVE'}
    document.getElementById('footer').textContent='Polling every '+(POLL/1000)+'s · '+(d.instruments||[]).length+' instruments';
  }catch(e){
    connected=false;
    document.getElementById('liveDot').classList.add('off');
    document.getElementById('liveLabel').textContent='OFFLINE';
    document.getElementById('footer').textContent='Connection lost — retrying...';
  }
}

document.addEventListener('click',()=>{if('Notification' in window&&Notification.permission==='default')Notification.requestPermission()},{once:true});
poll();
setInterval(poll,POLL);
</script>
</body>
</html>
